/* ────────────────────────────────────────────────────────────────────────
   TEXT TOKENIZER  →  words[] + sentences[] with char offsets
   ──────────────────────────────────────────────────────────────────────── */
function tokenize(text){
  // words with global char offsets
  const words = [];
  const re = /\S+/g; let m;
  while((m = re.exec(text)) !== null){
    words.push({ text:m[0], start:m.index, end:m.index + m[0].length });
  }
  // sentences (rough, keeps paragraph boundaries)
  const sentences = [];
  const sRe = /[^.!?\n]+[.!?]*[\s]*|\n+/g; let s;
  while((s = sRe.exec(text)) !== null){
    const raw = s[0];
    if(!raw.trim()){ continue; }
    const startChar = s.index;
    const endChar = s.index + raw.length;
    // map to word indices
    let wStart = words.findIndex(w => w.end > startChar && w.start < endChar);
    if(wStart === -1) continue;
    let wEnd = wStart;
    for(let i=wStart; i<words.length; i++){
      if(words[i].start < endChar) wEnd = i; else break;
    }
    sentences.push({ text:raw.trim(), startChar, endChar, wStart, wEnd });
  }
  return { words, sentences };
}

/* split text into speakable sentence chunks (short = avoids the Chrome
   long-utterance cutoff while recording) */
function chunkSentences(text){
  return (text.replace(/\n+/g,' ').match(/[^.!?]+[.!?]+|\S[^.!?]*$/g) || [text])
    .map(s=>s.trim()).filter(Boolean);
}

/* apply user pronunciation rules (localStorage vf_pron) to a string */
function applyPron(text){
  let rules = [];
  try { rules = JSON.parse(localStorage.getItem('vf_pron') || '[]'); } catch(e){}
  let out = text;
  rules.forEach(r=>{
    if(!r.from) return;
    const esc = r.from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp('\\b'+esc+'\\b', 'gi'), r.to || '');
  });
  return out;
}

/* generic blob download */
function downloadBlob(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

/* downmix an AudioBuffer to mono Float32 */
function bufferToMono(buf){
  const ch = buf.numberOfChannels;
  if(ch === 1) return buf.getChannelData(0);
  const out = new Float32Array(buf.length);
  for(let c=0;c<ch;c++){ const d = buf.getChannelData(c); for(let i=0;i<buf.length;i++) out[i]+=d[i]/ch; }
  return out;
}

/* Float32 PCM → 16-bit WAV blob (zero dependencies, always works) */
function encodeWAV(samples, sampleRate){
  const buffer = new ArrayBuffer(44 + samples.length*2);
  const v = new DataView(buffer);
  const w = (off,str)=>{ for(let i=0;i<str.length;i++) v.setUint8(off+i, str.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36+samples.length*2, true); w(8,'WAVE');
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sampleRate,true); v.setUint32(28,sampleRate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,'data'); v.setUint32(40, samples.length*2, true);
  let off=44; for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i])); v.setInt16(off, s<0?s*0x8000:s*0x7FFF, true); off+=2; }
  return new Blob([buffer], {type:'audio/wav'});
}

/* Float32 PCM → MP3 blob via lamejs (throws if lib unavailable → caller falls back to WAV) */
function encodeMP3(samples, sampleRate, kbps){
  const L = window.lamejs;
  if(!L || !L.Mp3Encoder) throw new Error('lamejs unavailable');
  const enc = new L.Mp3Encoder(1, sampleRate, kbps||128);
  const int16 = new Int16Array(samples.length);
  for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i])); int16[i]= s<0? s*0x8000 : s*0x7FFF; }
  const block = 1152, data = [];
  for(let i=0;i<int16.length;i+=block){
    const buf = enc.encodeBuffer(int16.subarray(i, i+block));
    if(buf.length) data.push(new Int8Array(buf));
  }
  const end = enc.flush(); if(end.length) data.push(new Int8Array(end));
  return new Blob(data, {type:'audio/mpeg'});
}

/* tidy extracted text: drop ad/nav cruft, lone page numbers, collapse blank runs */
function cleanText(raw){
  const lines = raw.replace(/\r/g,'').split('\n').map(l=>l.replace(/[ \t]+/g,' ').trim());
  const junk = /^(advertisement|sponsored|share this|subscribe|cookie|accept all|menu|home\s*›|next\s*›|©|all rights reserved)/i;
  const out = [];
  for(const l of lines){
    if(/^\d{1,4}$/.test(l)) continue;            // bare page numbers
    if(junk.test(l)) continue;                    // common header/footer/ad lines
    out.push(l);
  }
  return out.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}

/* parse an uploaded File → plain text. Real extraction for PDF & DOCX & TXT. */
async function parseFile(file){
  const name = file.name.toLowerCase();
  if(/\.txt$/.test(name) || /\.md$/.test(name)){
    return cleanText(await file.text());
  }
  if(/\.pdf$/.test(name)){
    if(!window.pdfjsLib) throw new Error('PDF engine failed to load. Check your connection and retry.');
    const data = new Uint8Array(await file.arrayBuffer());
    const pdf = await window.pdfjsLib.getDocument({ data }).promise;
    let text = '';
    for(let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      // reconstruct lines using the y-position of each text item
      let lastY = null, line = '';
      const parts = [];
      content.items.forEach(it=>{
        const y = it.transform[5];
        if(lastY !== null && Math.abs(y - lastY) > 3){ parts.push(line); line = ''; }
        line += it.str + (it.hasEOL ? '' : ' ');
        lastY = y;
      });
      if(line) parts.push(line);
      text += parts.join('\n') + '\n\n';
    }
    return cleanText(text);
  }
  if(/\.docx$/.test(name)){
    if(!window.mammoth) throw new Error('DOCX engine failed to load. Check your connection and retry.');
    const res = await window.mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
    return cleanText(res.value);
  }
  if(/\.(epub|ppt|pptx|doc)$/.test(name)){
    throw new Error('UNSUPPORTED');   // handled by caller with a friendly message
  }
  // unknown → try as plain text
  return cleanText(await file.text());
}

/* build podcast/plain narration segments: [{ text, pause(ms) }] */
function buildSegments(doc, podcast){
  const paras = doc.body.split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean);
  const segs = [];
  if(podcast){
    segs.push({ text:`Welcome to VoiceFlow. You're listening to: ${doc.title}.`, pause:900 });
    segs.push({ text:`Let's begin.`, pause:700 });
  }
  paras.forEach((para, pi)=>{
    chunkSentences(para).forEach(s=> segs.push({ text:s, pause:0 }));
    // pause between sections in podcast mode
    if(podcast && pi < paras.length-1) segs[segs.length-1].pause = 750;
  });
  if(podcast){
    segs.push({ text:`That's the end of ${doc.title}. Thanks for listening to VoiceFlow.`, pause:0 });
  }
  return segs;
}

/* ── Claude API (real AI tools) ─────────────────────────────────────────────
   Browser-only: raw fetch against the Messages API with the direct-browser-
   access header. The user supplies their own key (Settings → AI), stored in
   localStorage. No key → callers fall back to mock responses. */
const VF_AI = {
  key:   ()=>{ try { return localStorage.getItem('vf_apikey') || ''; } catch(e){ return ''; } },
  model: ()=>{ try { return localStorage.getItem('vf_model') || 'claude-opus-4-8'; } catch(e){ return 'claude-opus-4-8'; } },
};
function docContext(doc){
  // cap the document we send to keep requests bounded (and bills sane)
  const body = doc.body.length > 60000 ? doc.body.slice(0,60000) + '\n…[truncated]' : doc.body;
  return `Title: ${doc.title}\n\n${body}`;
}
async function callClaude({ system, user, maxTokens=1024, schema=null, effort=null }){
  const key = VF_AI.key();
  if(!key){ const e = new Error('No API key'); e.noKey = true; throw e; }
  const body = {
    model: VF_AI.model(),
    max_tokens: maxTokens,
    system,
    messages: [{ role:'user', content: user }],
  };
  // output_config carries both the structured-output schema and the effort lever
  const oc = {};
  if(effort) oc.effort = effort;                       // "low" = fewer tokens, faster, terser
  if(schema) oc.format = { type:'json_schema', schema };
  if(Object.keys(oc).length) body.output_config = oc;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify(body),
  });
  if(!res.ok){
    let msg = 'HTTP ' + res.status;
    try { const e = await res.json(); if(e.error && e.error.message) msg = e.error.message; } catch(_){}
    if(res.status === 401) msg = 'Invalid API key — check Settings → AI.';
    throw new Error(msg);
  }
  const data = await res.json();
  if(data.stop_reason === 'refusal') throw new Error('The model declined this request.');
  const text = (data.content || []).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(schema){
    try { return JSON.parse(text); }
    catch(e){ const m = text.match(/\{[\s\S]*\}/); if(m) return JSON.parse(m[0]); throw new Error('Could not parse the AI response.'); }
  }
  return text;
}
/* ── ElevenLabs voice cloning + TTS ─────────────────────────────────────────
   Browser-direct calls (xi-api-key header). Cloning needs a paid ElevenLabs
   plan; the user supplies their own key (Settings → Voice). */
const VF_11 = {
  key: ()=>{ try { return localStorage.getItem('vf_eleven_key') || ''; } catch(e){ return ''; } },
};
async function elevenClone(name, files){
  const key = VF_11.key();
  if(!key) throw new Error('Add an ElevenLabs API key in Settings → Voice.');
  const fd = new FormData();
  fd.append('name', name);
  [...files].forEach(f=> fd.append('files', f, f.name));
  const res = await fetch('https://api.elevenlabs.io/v1/voices/add', {
    method:'POST', headers:{ 'xi-api-key': key }, body: fd,
  });
  if(!res.ok){
    let m = 'HTTP ' + res.status;
    try { const e = await res.json(); m = (e.detail && (e.detail.message || e.detail)) || m; } catch(_){}
    if(res.status === 401) m = 'Invalid ElevenLabs API key.';
    if(res.status === 403) m = 'Voice cloning needs a paid ElevenLabs plan.';
    throw new Error(typeof m === 'string' ? m : 'Cloning failed');
  }
  const data = await res.json();
  return data.voice_id;
}
async function elevenTTS(voiceId, text, signal){
  const key = VF_11.key();
  if(!key) throw new Error('No ElevenLabs key');
  const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + encodeURIComponent(voiceId), {
    method:'POST', signal,
    headers:{ 'xi-api-key': key, 'content-type':'application/json', 'accept':'audio/mpeg' },
    body: JSON.stringify({ text, model_id:'eleven_multilingual_v2' }),
  });
  if(!res.ok){
    let m = 'HTTP ' + res.status;
    try { const e = await res.json(); m = (e.detail && (e.detail.message || e.detail)) || m; } catch(_){}
    throw new Error(typeof m === 'string' ? m : 'Speech generation failed');
  }
  return await res.blob();
}

/* ────────────────────────────────────────────────────────────────────────

   ──────────────────────────────────────────────────────────────────────── */
function App(){

  const [aiOpen, setAiOpen] = useState(wide);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [exportOpen, setExportOpen] = useState(false);
  const [exportPodcast, setExportPodcast] = useState(false);
  const [focusMode, setFocusMode] = useState(false);
  const openExport = (pc)=>{ setExportPodcast(!!pc); setExportOpen(true); };

  /* saved flashcards (persisted, aggregated in dashboard) */
  const [savedCards, setSavedCards] = useState(()=>{
    try{ const s=localStorage.getItem('vf_cards'); if(s) return JSON.parse(s); }catch(e){}
    return [];
  });
  useEffect(()=>{ try{ localStorage.setItem('vf_cards', JSON.stringify(savedCards)); }catch(e){} }, [savedCards]);
  function saveCards(list){
    setSavedCards(prev=>{
      const tag = (c)=>c.q+'|'+c.a;
      const have = new Set(prev.map(tag));
      const add = list.filter(c=>!have.has(tag(c))).map(c=>({...c, docId:activeId, docTitle:activeDoc.title}));
      return [...add, ...prev];
    });

  }


  /* cloned (ElevenLabs) voices */
  const [clonedVoices, setClonedVoices] = useState(loadClonedVoices);
  useEffect(()=>{ try{ localStorage.setItem('vf_voices', JSON.stringify(clonedVoices)); }catch(e){} }, [clonedVoices]);
  const [voiceLab, setVoiceLab] = useState(false);
  const allVoices = useMemo(()=>[...clonedVoices, ...VOICES], [clonedVoices]);
  const isCloned = (id)=> clonedVoices.some(v=>v.id===id);

  /* playback state */
  const [playing, setPlaying] = useState(false);
  const [rate, setRate] = useState(1.0);
  const [volume, setVolume] = useState(1.0);
  const [voiceId, setVoiceId] = useState('aria');
  const [curSentence, setCurSentence] = useState(0);
  const [curWord, setCurWord] = useState(-1);

  /* study options */
  const [repeat, setRepeat] = useState(1);       // 1..3
  const [sentencePause, setSentencePause] = useState(250); // ms
  const [readMode, setReadMode] = useState('normal'); // normal | study | skim

  /* display options */
  const [fontSize, setFontSize] = useState(20);
  const [lineH, setLineH] = useState(1.9);
  const [dyslexia, setDyslexia] = useState(false);
  const [hiContrast, setHiContrast] = useState(false);

  /* annotations: { [docId]: { notedWords: Set-as-array, notes:[{id,text,word,ts}] } } */
  const [annos, setAnnos] = useState(()=>{
    try{ const s=localStorage.getItem('vf_annos'); if(s) return JSON.parse(s); }catch(e){}
    return {};
  });
  useEffect(()=>{ try{ localStorage.setItem('vf_annos', JSON.stringify(annos)); }catch(e){} }, [annos]);
  const docAnno = annos[activeId] || { notedWords:[], notes:[] };

  /* tokenization (memoized per doc) */
  const { words, sentences } = useMemo(()=>tokenize(activeDoc.body), [activeDoc.id]);

  /* sentence list filtered for skim mode */
  const playOrder = useMemo(()=>{
    if(readMode !== 'skim') return sentences.map((_,i)=>i);
    // first sentence of each paragraph: detect paragraph starts by newline gaps
    const order = []; let lastEnd = -1;
    sentences.forEach((s,i)=>{
      const before = activeDoc.body.slice(0, s.startChar);
      const isParaStart = i===0 || /\n\s*$/.test(before.slice(-3)) || activeDoc.body.slice(lastEnd, s.startChar).includes('\n');
      if(isParaStart) order.push(i);
      lastEnd = s.endChar;
    });
    return order.length ? order : sentences.map((_,i)=>i);
  }, [readMode, sentences, activeDoc.id]);

  /* refs that the speech loop reads synchronously */
  const stateRef = useRef({});
  stateRef.current = { rate, volume, voiceId, sentences, repeat, sentencePause, playOrder, readMode, cloned: clonedVoices };

  const synthVoices = useRef([]);
  useEffect(()=>{
    const load = ()=>{ synthVoices.current = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; };
    load();
    if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = load;
  }, []);

  function pickVoice(vId){
    const def = VOICES.find(v=>v.id===vId) || VOICES[0];
    const list = synthVoices.current || [];
    // best match by language
    let v = list.find(x=>x.lang === def.lang);
    if(!v) v = list.find(x=>x.lang && x.lang.slice(0,2) === def.lang.slice(0,2));
    return { sysVoice:v||null, meta:def };
  }

  const playingRef = useRef(false);
  const repeatCountRef = useRef(0);
  const orderIdxRef = useRef(0);
  const audioRef = useRef(null);     // <audio> for cloned-voice playback
  const abortRef = useRef(null);     // aborts in-flight ElevenLabs fetch

  /* shared: what to do after a sentence finishes (repeat / advance / finish) */
  function advanceAfter(sIdx){
    if(!playingRef.current) return;
    const st2 = stateRef.current;
    if(repeatCountRef.current < (st2.repeat - 1)){
      repeatCountRef.current += 1;
      setTimeout(()=>{ if(playingRef.current) speakSentence(sIdx); }, st2.sentencePause);
      return;
    }
    repeatCountRef.current = 0;
    const order = st2.playOrder;
    let oi = order.indexOf(sIdx);
    if(oi === -1){ oi = orderIdxRef.current; }
    const nextOi = oi + 1;
    if(nextOi >= order.length){ finishDoc(); return; }
    orderIdxRef.current = nextOi;
    const nextS = order[nextOi];
    setCurSentence(nextS);
    setTimeout(()=>{ if(playingRef.current) speakSentence(nextS); }, st2.sentencePause);
  }

  /* cloned-voice playback via ElevenLabs (sentence-level highlight) */
  const speakEleven = useCallback((sIdx)=>{
    const st = stateRef.current;
    const sent = st.sentences[sIdx];
    if(!sent){ stopAll(); return; }
    setCurSentence(sIdx);
    setCurWord(-1);
    if(abortRef.current) abortRef.current.abort();
    const ctrl = new AbortController(); abortRef.current = ctrl;
    elevenTTS(st.voiceId, applyPron(sent.text), ctrl.signal).then(blob=>{
      if(!playingRef.current) return;
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.playbackRate = Math.max(0.5, Math.min(4, st.rate));
      audio.volume = st.volume;
      audioRef.current = audio;
      audio.onended = ()=>{ URL.revokeObjectURL(url); advanceAfter(sIdx); };
      audio.play().catch(()=>{});
    }).catch(err=>{
      if(err && err.name === 'AbortError') return;
      toast('Voice error: ' + (err && err.message ? err.message : err), '#ef4444');
      stopAll();
    });
  }, [toast]);

  /* speak a single sentence (by sentence index) */
  const speakSentence = useCallback((sIdx)=>{
    const st = stateRef.current;
    if((st.cloned||[]).some(v=>v.id===st.voiceId)){ speakEleven(sIdx); return; }
    const synth = window.speechSynthesis;
    if(!synth){ toast('Web Speech API not supported in this browser', '#ef4444'); return; }
    const sent = st.sentences[sIdx];
    if(!sent) { stopAll(); return; }

    const u = new SpeechSynthesisUtterance(sent.text);
    const { sysVoice, meta } = pickVoice(st.voiceId);
    if(sysVoice) u.voice = sysVoice;
    u.lang = (sysVoice && sysVoice.lang) || meta.lang;
    u.rate = Math.max(0.5, Math.min(4, st.rate));
    u.pitch = meta.pitch;
    u.volume = st.volume;

    u.onboundary = (e)=>{
      if(e.name && e.name !== 'word' && e.charIndex == null) return;
      const globalChar = sent.startChar + (e.charIndex || 0);
      // find word containing globalChar
      let wi = -1;
      for(let i=sent.wStart; i<=sent.wEnd; i++){
        if(words[i] && words[i].start <= globalChar && globalChar < words[i].end){ wi = i; break; }
        if(words[i] && words[i].start > globalChar){ wi = i; break; }
      }
      if(wi >= 0) setCurWord(wi);
    };

    u.onend = ()=>{ advanceAfter(sIdx); };

    setCurSentence(sIdx);
    setCurWord(sent.wStart);
    synth.speak(u);
  }, [words, toast, speakEleven]);

  const keepAliveRef = useRef(null);
  function stopKeepAlive(){ if(keepAliveRef.current){ clearInterval(keepAliveRef.current); keepAliveRef.current = null; } }
  function startKeepAlive(){
    // mobile/Chrome silence speech after ~15s; periodic resume() keeps it going
    stopKeepAlive();
    keepAliveRef.current = setInterval(()=>{
      if(playingRef.current && window.speechSynthesis){ try{ window.speechSynthesis.resume(); }catch(e){} }
      else stopKeepAlive();
    }, 9000);
  }
  function killAudio(){
    stopKeepAlive();
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    if(audioRef.current){ try{ audioRef.current.pause(); }catch(e){} audioRef.current = null; }
    if(abortRef.current){ try{ abortRef.current.abort(); }catch(e){} abortRef.current = null; }
  }
  function startFrom(sIdx){
    killAudio();
    startKeepAlive();
    repeatCountRef.current = 0;
    const order = stateRef.current.playOrder;
    let oi = order.indexOf(sIdx);
    if(oi === -1){ // snap to nearest in order
      oi = order.findIndex(x=>x>=sIdx); if(oi===-1) oi = 0;
    }
    orderIdxRef.current = oi;
    playingRef.current = true;
    setPlaying(true);
    speakSentence(order[oi]);
  }

  function pause(){
    playingRef.current = false;
    killAudio();
    setPlaying(false);
  }
  function stopAll(){
    playingRef.current = false;
    killAudio();
    setPlaying(false);
    setCurWord(-1);
  }
  function finishDoc(){
    playingRef.current = false;
    setPlaying(false);
    setCurWord(-1);
    markProgress(100);
    toast('Reached end of document ✓', '#10b981');
  }

  function togglePlay(){
    if(playing){ pause(); }
    else { startFrom(curSentence); }
  }
  function skip(dir){
    const order = stateRef.current.playOrder;
    let oi = order.indexOf(curSentence);
    if(oi===-1){ oi = orderIdxRef.current; }
    let nextOi = Math.max(0, Math.min(order.length-1, oi + dir));
    const nextS = order[nextOi];
    setCurSentence(nextS);
    setCurWord(sentences[nextS] ? sentences[nextS].wStart : -1);
    if(playing){ startFrom(nextS); }
  }

  /* progress tracking */
  function markProgress(p){
    setDocs(ds=>ds.map(d=> d.id===activeId ? {...d, progress:p, status: p>=100?'Complete':'In Progress'} : d));
  }
  useEffect(()=>{
    if(sentences.length){
      const p = Math.round((curSentence/(sentences.length-1||1))*100);
      // update softly without spamming
      const t = setTimeout(()=>markProgress(Math.max(p, 0)), 400);
      return ()=>clearTimeout(t);
    }
  }, [curSentence]);

  /* switching doc resets playback */
  useEffect(()=>{ stopAll(); setCurSentence(0); orderIdxRef.current=0; }, [activeId]);

  /* apply read-mode defaults */
  useEffect(()=>{
    if(readMode==='study'){ setRate(1.0); }
  }, [readMode]);

  /* keyboard shortcuts */
  useEffect(()=>{
    const onKey = (e)=>{
      const tag = (e.target.tagName||'').toLowerCase();
      if(tag==='input' || tag==='textarea' || e.target.isContentEditable) return;
      if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
      else if(e.code==='ArrowRight'){ e.preventDefault(); skip(1); }
      else if(e.code==='ArrowLeft'){ e.preventDefault(); skip(-1); }
      else if(e.key==='f' || e.key==='F'){ setFocusMode(v=>!v); }
    };
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  });

  /* word click → toggle yellow highlight note */
  function toggleWordNote(wi){
    setAnnos(a=>{
      const cur = a[activeId] || { notedWords:[], notes:[] };
      const has = cur.notedWords.includes(wi);
      const notedWords = has ? cur.notedWords.filter(x=>x!==wi) : [...cur.notedWords, wi];
      return { ...a, [activeId]: { ...cur, notedWords } };
    });
  }
  function addSelectionNote(){
    const sel = window.getSelection();
    const text = sel ? sel.toString().trim() : '';
    if(!text){ toast('Select some text first','#f59e0b'); return; }
    setAnnos(a=>{
      const cur = a[activeId] || { notedWords:[], notes:[] };
      const note = { id:Math.random().toString(36).slice(2), text, ts:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) };
      return { ...a, [activeId]: { ...cur, notes:[note, ...cur.notes] } };
    });
    toast('Note added', '#10b981');
  }
  function exportNotes(){
    const a = annos[activeId] || { notedWords:[], notes:[] };
    let md = `# Notes — ${activeDoc.title}\n\n`;
    md += `## Highlights\n`;
    if(a.notedWords.length){
      a.notedWords.sort((x,y)=>x-y).forEach(wi=>{ md += `- ${words[wi] ? words[wi].text : ''}\n`; });
    } else md += `_None_\n`;
    md += `\n## Margin Notes\n`;
    if(a.notes.length){ a.notes.forEach(n=>{ md += `- (${n.ts}) ${n.text}\n`; }); }
    else md += `_None_\n`;
    download(`${activeDoc.title.replace(/\s+/g,'_')}_notes.md`, md);
    toast('Notes exported (.md)', '#10b981');
  }

  function download(name, content){
    const blob = new Blob([content], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name; a.click();
    URL.revokeObjectURL(url);
  }

  /* import text/url/file */
  function addDoc(doc){
    setDocs(ds=>[doc, ...ds]);
    setActiveId(doc.id);
  }

  const voiceMeta = allVoices.find(v=>v.id===voiceId) || VOICES[0];
  const sentenceHi = isCloned(voiceId) || IS_IOS;   // cloned voices + iOS highlight by sentence (no word timings)

  function openDoc(id){ setActiveId(id); setView('reader'); }

  /* ───────────────── RENDER ───────────────── */
  return (
    <ToastCtx.Provider value={toast}>
    <div className={cx('h-full w-full flex overflow-hidden', hiContrast && 'hi-contrast',
        'bg-softw text-navy dark:bg-navy dark:text-slate-100')}>

      {/* ========== NAV RAIL ========== */}
      <NavRail view={view} setView={setView} dark={dark} setDark={setDark}
        onSettings={()=>setSettingsOpen(true)} focusMode={focusMode} />

      {/* ========== VIEW COLUMN ========== */}
      <div className="flex-1 min-w-0 flex flex-col">

      {view==='home' && (
        <LibraryHome docs={docs} openDoc={openDoc} addDoc={addDoc}
          savedCards={savedCards} annos={annos} toast={toast} setView={setView} />
      )}

      {view==='dashboard' && (
        <StudyDashboard docs={docs} annos={annos} savedCards={savedCards}
          setSavedCards={setSavedCards} openDoc={openDoc} toast={toast} />
      )}

      {view==='reader' && (<>
      {/* ========== TOP TOOLBAR ========== */}
      <Toolbar
        playing={playing} togglePlay={togglePlay} skip={skip}
        rate={rate} setRate={setRate}
        volume={volume} setVolume={setVolume}
        voiceId={voiceId} setVoiceId={setVoiceId}
        progress={sentences.length ? (curSentence/(sentences.length-1||1)) : 0}
        onSeek={(frac)=>{ const idx = Math.round(frac*(sentences.length-1)); setCurSentence(idx); if(playing) startFrom(idx); }}
        dark={dark} setDark={setDark}
        sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen}
        aiOpen={aiOpen} setAiOpen={setAiOpen}
        setSettingsOpen={setSettingsOpen}
        openExport={openExport}
        focusMode={focusMode} setFocusMode={setFocusMode}
        voiceMeta={voiceMeta} voices={allVoices}
        onCloneVoice={()=>setVoiceLab(true)}
        toast={toast}
      />

      {/* ========== BODY ========== */}
      <div className="flex-1 flex min-h-0">

        {/* SIDEBAR */}
        {!focusMode && (
          <Sidebar
            open={sidebarOpen} setOpen={setSidebarOpen}
            docs={docs} activeId={activeId} setActiveId={setActiveId}
            addDoc={addDoc} toast={toast}
          />
        )}

        {/* MAIN READER */}
        <Reader
          doc={activeDoc}
          words={words} sentences={sentences}
          curWord={curWord} curSentence={curSentence}
          fontSize={fontSize} lineH={lineH} dyslexia={dyslexia}
          focusMode={focusMode} setFocusMode={setFocusMode}
          notedWords={docAnno.notedWords}
          onWordClick={toggleWordNote}
          onAddNote={addSelectionNote}
          playing={playing}
          sentenceHi={sentenceHi}
        />

        {/* AI PANEL */}
        {!focusMode && (
          <AIPanel
            open={aiOpen} setOpen={setAiOpen}
            doc={activeDoc}
            anno={docAnno} exportNotes={exportNotes}
            saveCards={saveCards}
            toast={toast}
          />
        )}
      </div>

      {/* FLOATING STUDY-MODE BAR */}
      {!focusMode && (
        <StudyBar
          readMode={readMode} setReadMode={setReadMode}
          repeat={repeat} setRepeat={setRepeat}
          sentencePause={sentencePause} setSentencePause={setSentencePause}
        />
      )}
      </>)}

      </div>{/* end view column */}

      {/* SETTINGS DRAWER */}
      {settingsOpen && (
        <Settings
          onClose={()=>setSettingsOpen(false)}
          fontSize={fontSize} setFontSize={setFontSize}
          lineH={lineH} setLineH={setLineH}
          dyslexia={dyslexia} setDyslexia={setDyslexia}
          hiContrast={hiContrast} setHiContrast={setHiContrast}
          rate={rate} setRate={setRate}
          voiceId={voiceId} setVoiceId={setVoiceId}
          voices={allVoices} clonedVoices={clonedVoices} setClonedVoices={setClonedVoices}
          onCloneVoice={()=>{ setSettingsOpen(false); setVoiceLab(true); }}
          toast={toast}
        />
      )}

      {/* VOICE LAB (clone a voice) */}
      {voiceLab && (
        <VoiceLab
          onClose={()=>setVoiceLab(false)}
          onCloned={(v)=>{ setClonedVoices(cs=>[v, ...cs]); setVoiceId(v.id); }}
          toast={toast}
        />
      )}

      {/* EXPORT AUDIO MODAL */}
      {exportOpen && (
        <ExportModal
          onClose={()=>setExportOpen(false)}
          doc={activeDoc} rate={rate} volume={volume} voiceId={voiceId}
          initialPodcast={exportPodcast}
          onComplete={()=>toast('Export complete ✓', '#10b981')}
          toast={toast}
        />
      )}

      <ToastHost toasts={toasts} />
    </div>
    </ToastCtx.Provider>
  );
}

/* ────────────────────────────────────────────────────────────────────────
   TOOLBAR
   ──────────────────────────────────────────────────────────────────────── */
function Toolbar(props){
  const { playing, togglePlay, skip, rate, setRate, volume, setVolume, voiceId, setVoiceId,
    progress, onSeek, dark, setDark, sidebarOpen, setSidebarOpen, aiOpen, setAiOpen,
    setSettingsOpen, openExport, focusMode, setFocusMode, voiceMeta, voices, onCloneVoice, toast } = props;
  const [voiceMenu, setVoiceMenu] = useState(false);
  const list = voices || VOICES;

  async function previewVoice(v){
    if(v.cloned){
      try { const blob = await elevenTTS(v.id, `Hi, I'm ${v.name}. This is how I sound.`); new Audio(URL.createObjectURL(blob)).play().catch(()=>{}); }
      catch(e){ toast('Preview failed: ' + (e && e.message ? e.message : e), '#ef4444'); }
      return;
    }
    const synth = window.speechSynthesis; if(!synth) return;
    synth.cancel();
    const u = new SpeechSynthesisUtterance(`Hi, I'm ${v.name}. This is how I sound.`);
    const sys = synth.getVoices();
    const match = sys.find(x=>x.lang===v.lang) || sys.find(x=>x.lang && x.lang.slice(0,2)===v.lang.slice(0,2));
    if(match) u.voice = match; u.lang = v.lang; u.pitch = v.pitch; u.rate = rate;
    synth.speak(u);
  }

  return (
    <header className="sticky top-0 z-40 shrink-0 min-h-16 lg:h-16 px-3 py-2 lg:py-0 flex flex-wrap lg:flex-nowrap items-center gap-2
        bg-white/80 dark:bg-navy2/80 backdrop-blur border-b border-slate-200 dark:border-navy3">

      {/* brand + sidebar toggle */}
      <div className="flex items-center gap-2 pr-2">
        <IconBtn icon={I.panel} label="Toggle library" active={sidebarOpen} onClick={()=>setSidebarOpen(o=>!o)} />
        <div className="flex items-center gap-2 select-none">
          <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-accent to-indigo-500 grid place-items-center text-white shadow-lg shadow-accent/30">
            <I.spark className="w-4 h-4" />
          </div>
          <span className="font-extrabold tracking-tight text-lg hidden sm:block">VoiceFlow</span>
        </div>
      </div>

      <div className="w-px h-8 bg-slate-200 dark:bg-navy3 mx-1" />

      {/* transport */}
      <div className="flex items-center gap-1">
        <IconBtn icon={I.prev} label="Previous sentence (←)" onClick={()=>skip(-1)} />
        <IconBtn icon={playing ? I.pause : I.play} label="Play / Pause (space)" big active onClick={togglePlay} />
        <IconBtn icon={I.next} label="Next sentence (→)" onClick={()=>skip(1)} />
      </div>

      {/* progress */}
      <div className="order-last basis-full lg:order-none lg:basis-auto flex-1 min-w-[120px] px-2 flex items-center gap-3">
        <ProgressBar progress={progress} onSeek={onSeek} />
        <span className="text-xs tabular-nums text-slate-400 w-10 text-right">{Math.round(progress*100)}%</span>
      </div>

      {/* speed */}
      <div className="hidden md:flex items-center gap-2 px-2 text-slate-500 dark:text-slate-300">
        <input type="range" min="0.5" max="4" step="0.05" value={rate}
          onChange={e=>setRate(parseFloat(e.target.value))} className="w-24 text-slate-400" />
        <span className="text-xs font-semibold tabular-nums w-9">{rate.toFixed(2)}x</span>
        <div className="flex gap-1">
          {SPEED_PRESETS.map(p=>(
            <button key={p.label} onClick={()=>setRate(p.value)}
              className={cx('text-[11px] px-2 py-1 rounded-lg font-semibold transition',
                Math.abs(rate-p.value)<0.001 ? 'bg-accent text-white' : 'bg-slate-200/70 dark:bg-navy3 hover:bg-slate-300 dark:hover:bg-navy3/70')}>
              {p.label}
            </button>
          ))}
        </div>
      </div>

      {/* volume */}
      <div className="hidden lg:flex items-center gap-1 px-1 text-slate-500 dark:text-slate-300">
        <I.vol className="w-4 h-4" />
        <input type="range" min="0" max="1" step="0.05" value={volume}
          onChange={e=>setVolume(parseFloat(e.target.value))} className="w-16 text-slate-400" />
      </div>

      {/* voice selector */}
      <div className="relative">
        <button onClick={()=>setVoiceMenu(m=>!m)}
          className="flex items-center gap-2 px-3 h-9 rounded-xl bg-slate-200/70 dark:bg-navy3 hover:bg-slate-300 dark:hover:bg-navy3/70 text-sm font-semibold">
          <span className="w-2 h-2 rounded-full bg-accent" />
          {voiceMeta.name}
          <span className="text-[10px] text-slate-400 hidden xl:block">{voiceMeta.tag}</span>
          <I.chev className="w-4 h-4 rotate-90 opacity-60" />
        </button>
        {voiceMenu && (
          <>
          <div className="fixed inset-0 z-30" onClick={()=>setVoiceMenu(false)} />
          <div className="absolute right-0 mt-2 w-72 z-40 rounded-2xl bg-white dark:bg-navy2 border border-slate-200 dark:border-navy3 shadow-2xl p-2 animate-pop max-h-[70vh] overflow-y-auto">
            <div className="px-2 py-1.5 text-[11px] uppercase tracking-wider text-slate-400 font-bold">Voices</div>
            {list.map(v=>(
              <div key={v.id} className={cx('flex items-center gap-2 px-2 py-2 rounded-xl cursor-pointer',
                voiceId===v.id ? 'bg-accent/10' : 'hover:bg-slate-100 dark:hover:bg-navy3/60')}
                onClick={()=>{ setVoiceId(v.id); }}>
                <div className={cx('w-8 h-8 rounded-lg grid place-items-center text-white text-xs font-bold',
                  v.cloned ? 'bg-gradient-to-br from-emerald-500 to-teal-500' : 'bg-gradient-to-br from-accent/80 to-indigo-500/80')}>
                  {v.name[0]}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold flex items-center gap-1.5 truncate">{v.name}{v.cloned && <Pill tone="green">Cloned</Pill>}</div>
                  <div className="text-[11px] text-slate-400">{v.tag}</div>
                </div>
                <button onClick={(e)=>{ e.stopPropagation(); previewVoice(v); }}
                  className="w-7 h-7 grid place-items-center rounded-lg bg-slate-200 dark:bg-navy3 hover:bg-accent hover:text-white transition shrink-0" title="Preview voice">
                  <I.play className="w-3.5 h-3.5" />
                </button>
              </div>
            ))}
            <button onClick={()=>{ setVoiceMenu(false); onCloneVoice && onCloneVoice(); }}
              className="mt-1 w-full flex items-center gap-2 px-2 py-2 rounded-xl text-sm font-semibold text-accent hover:bg-accent/10 transition">
              <span className="w-8 h-8 rounded-lg border-2 border-dashed border-accent/50 grid place-items-center"><I.plus className="w-4 h-4" /></span>
              Clone your own voice
            </button>
          </div>
          </>
        )}
      </div>

      <div className="w-px h-8 bg-slate-200 dark:bg-navy3 mx-1" />

      {/* right cluster */}
      <IconBtn icon={I.wave} label="Convert to Podcast" onClick={()=>openExport(true)} className="max-md:hidden" />
      <IconBtn icon={I.dl} label="Export audio (MP3)" onClick={()=>openExport(false)} className="max-md:hidden" />
      <IconBtn icon={I.focus} label="Focus mode (F)" active={focusMode} onClick={()=>setFocusMode(f=>!f)} className="max-md:hidden" />
      <IconBtn icon={I.spark} label="AI tools" active={aiOpen} onClick={()=>setAiOpen(o=>!o)} />
      <IconBtn icon={dark ? I.sun : I.moon} label="Toggle theme" onClick={()=>setDark(d=>!d)} className="max-md:hidden" />
      <IconBtn icon={I.gear} label="Settings" onClick={()=>setSettingsOpen(true)} className="max-md:hidden" />
    </header>
  );
}

function ProgressBar({ progress, onSeek }){
  const ref = useRef(null);
  function handle(e){
    const r = ref.current.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (e.clientX - r.left)/r.width));
    onSeek(frac);
  }
  return (
    <div ref={ref} onClick={handle}
      className="group relative h-2 flex-1 rounded-full bg-slate-200 dark:bg-navy3 cursor-pointer">
      <div className="absolute inset-y-0 left-0 rounded-full bg-accent" style={{width:`${progress*100}%`}} />
      <div className="absolute top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-white border-2 border-accent shadow opacity-0 group-hover:opacity-100 transition"
        style={{left:`calc(${progress*100}% - 6px)`}} />
    </div>
  );
}

/* ────────────────────────────────────────────────────────────────────────
   SIDEBAR (library)

function Sidebar({ open, setOpen, docs, activeId, setActiveId, addDoc, toast }){
  const [importOpen, setImportOpen] = useState(false);
  const folders = ['Study','Work','Personal'];
  const [collapsed, setCollapsed] = useState({});
  const [sort, setSort] = useState('date');

  const sorted = (list)=>{
    const c = [...list];
    if(sort==='name') c.sort((a,b)=>a.title.localeCompare(b.title));
    else if(sort==='progress') c.sort((a,b)=>b.progress-a.progress);
    else c.sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));
    return c;
  };

  return (
    <>
    {/* mobile backdrop */}
    {open && <div className="fixed inset-0 z-30 bg-black/40 lg:hidden" onClick={()=>setOpen&&setOpen(false)} />}
    <aside className={cx('h-full border-r border-slate-200 dark:border-navy3 bg-white dark:bg-navy2 lg:bg-white/60 lg:dark:bg-navy2/40 flex flex-col z-40 shadow-2xl lg:shadow-none',
      // mobile: fixed slide-over drawer (clears the 64px nav rail + 64px toolbar)
      'fixed top-16 bottom-0 left-16 w-72 transition-transform duration-300',
      open ? 'translate-x-0' : '-translate-x-full',
      // desktop: static sibling that collapses by width
      'lg:static lg:top-0 lg:translate-x-0 lg:shrink-0 lg:transition-all lg:overflow-hidden',
      open ? 'lg:w-72' : 'lg:w-0')}>
      <div className="w-72 flex flex-col h-full">
        <div className="p-3 flex items-center justify-between">
          <h2 className="font-bold text-sm tracking-wide text-slate-500 dark:text-slate-300">LIBRARY</h2>
          <button onClick={()=>setImportOpen(true)}
            className="flex items-center gap-1 text-xs font-semibold px-2.5 py-1.5 rounded-lg bg-accent text-white hover:bg-blue-600 transition">
            <I.plus className="w-4 h-4" /> Add
          </button>
        </div>

        <div className="px-3 pb-2">
          <select value={sort} onChange={e=>setSort(e.target.value)}
            className="w-full text-xs rounded-lg bg-slate-100 dark:bg-navy3 border-0 px-2 py-1.5 text-slate-500 dark:text-slate-300 outline-none">
            <option value="date">Sort: Recently updated</option>
            <option value="name">Sort: Name (A–Z)</option>
            <option value="progress">Sort: Reading progress</option>
          </select>
        </div>

        <div className="flex-1 overflow-y-auto px-2 pb-4">
          {folders.map(f=>{
            const list = sorted(docs.filter(d=>d.folder===f));
            const isC = collapsed[f];
            return (
              <div key={f} className="mb-1">
                <button onClick={()=>setCollapsed(c=>({...c,[f]:!c[f]}))}
                  className="w-full flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-navy3/50 text-sm font-semibold text-slate-600 dark:text-slate-200">
                  <I.chev className={cx('w-4 h-4 transition-transform', !isC && 'rotate-90')} />
                  <I.folder className="w-4 h-4 text-accent" />
                  {f}
                  <span className="ml-auto text-[11px] text-slate-400">{list.length}</span>
                </button>
                {!isC && (
                  <div className="pl-2">
                    {list.map(d=>(
                      <button key={d.id} onClick={()=>setActiveId(d.id)}
                        className={cx('w-full text-left px-3 py-2 rounded-xl mb-1 group transition',
                          activeId===d.id ? 'bg-accent/10 ring-1 ring-accent/30' : 'hover:bg-slate-100 dark:hover:bg-navy3/50')}>
                        <div className="flex items-start gap-2">
                          <I.doc className={cx('w-4 h-4 mt-0.5 shrink-0', activeId===d.id ? 'text-accent':'text-slate-400')} />
                          <div className="min-w-0 flex-1">
                            <div className={cx('text-sm font-medium truncate', activeId===d.id && 'text-accent')}>{d.title}</div>
                            <div className="flex items-center gap-2 mt-1">
                              <Pill tone={d.status==='Complete'?'green':'amber'}>{d.status}</Pill>
                              <span className="text-[10px] text-slate-400">{d.updated}</span>
                            </div>
                            <div className="mt-1.5 h-1 rounded-full bg-slate-200 dark:bg-navy3 overflow-hidden">
                              <div className="h-full bg-accent" style={{width:`${d.progress}%`}} />
                            </div>
                          </div>
                        </div>
                      </button>
                    ))}
                    {list.length===0 && <div className="text-xs text-slate-400 px-3 py-2">Empty</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
      {importOpen && <ImportModal onClose={()=>setImportOpen(false)} addDoc={addDoc} toast={toast} />}
    </aside>
    </>
  );
}

/* ────────────────────────────────────────────────────────────────────────
   IMPORT MODAL (paste / file / url)
   ──────────────────────────────────────────────────────────────────────── */
function ImportModal({ onClose, addDoc, toast }){
  const [tab, setTab] = useState('paste');
  const [title, setTitle] = useState('');
  const [text, setText] = useState('');
  const [url, setUrl] = useState('');
  const [folder, setFolder] = useState('Study');
  const [busy, setBusy] = useState(false);
  const [parsing, setParsing] = useState('');     // filename being parsed
  const [parseErr, setParseErr] = useState('');
  const fileRef = useRef(null);

  function commit(body, autoTitle){
    const t = (title.trim() || autoTitle || 'Untitled Document');
    addDoc({
      id:'u'+Math.random().toString(36).slice(2), folder, title:t,
      status:'In Progress', progress:0, updated:new Date().toISOString().slice(0,10), body
    });
    toast('Document added to library', '#10b981');
    onClose();
  }

  async function onFile(e){
    const file = e.target.files[0]; if(!file) return;
    const name = file.name.replace(/\.[^.]+$/, '');
    setParseErr(''); setParsing(file.name);
    try {
      const text = await parseFile(file);
      if(!text || text.replace(/\s/g,'').length < 2){
        throw new Error('No readable text found — the file may be scanned images or empty.');
      }
      setParsing('');
      commit(text, name);
    } catch(err){
      setParsing('');
      if(err && err.message === 'UNSUPPORTED'){
        setParseErr(`${file.name.split('.').pop().toUpperCase()} isn't supported yet. PDF, DOCX and TXT extract real text; for others, paste the content directly.`);
      } else {
        setParseErr((err && err.message) || 'Could not read that file.');
      }
    } finally {
      if(fileRef.current) fileRef.current.value = '';
    }
  }

  function fetchUrl(){
    if(!url.trim()){ toast('Enter a URL','#f59e0b'); return; }
    setBusy(true);
    // Browser CORS blocks most direct fetches; simulate clean extraction.
    setTimeout(()=>{
      setBusy(false);
      commit(`[Article fetched from ${url}]\n\nThe reader strips headers, footers, navigation and ads, leaving clean body text. In this offline demo the fetch is simulated, but the pipeline would route through a readability service to return distraction-free prose ready for narration.`, 'Web Article');
    }, 1100);
  }

  const tabs = [
    { id:'paste', label:'Paste text', icon:I.type },
    { id:'file',  label:'Upload file', icon:I.upload },
    { id:'url',   label:'From URL', icon:I.link },
  ];

  return (
    <div className="fixed inset-0 z-[80] grid place-items-center bg-black/50 backdrop-blur-sm p-4" onClick={onClose}>
      <div className="w-full max-w-lg rounded-2xl bg-white dark:bg-navy2 border border-slate-200 dark:border-navy3 shadow-2xl animate-pop" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-slate-200 dark:border-navy3">
          <h3 className="font-bold text-lg">Add document</h3>
          <IconBtn icon={I.close} label="Close" onClick={onClose} />
        </div>
        <div className="p-4">
          <div className="flex gap-1 p-1 rounded-xl bg-slate-100 dark:bg-navy3/50 mb-4">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={cx('flex-1 flex items-center justify-center gap-1.5 text-sm font-semibold py-2 rounded-lg transition',
                  tab===t.id ? 'bg-white dark:bg-navy text-accent shadow' : 'text-slate-500')}>
                <t.icon className="w-4 h-4" /> {t.label}
              </button>
            ))}
          </div>

          <div className="grid grid-cols-2 gap-2 mb-3">
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Title (optional)"
              className="rounded-xl bg-slate-100 dark:bg-navy3/60 px-3 py-2 text-sm outline-none focus:ring-2 ring-accent" />
            <select value={folder} onChange={e=>setFolder(e.target.value)}
              className="rounded-xl bg-slate-100 dark:bg-navy3/60 px-3 py-2 text-sm outline-none">
              <option>Study</option><option>Work</option><option>Personal</option>
            </select>
          </div>

          {tab==='paste' && (
            <>
              <textarea value={text} onChange={e=>setText(e.target.value)} rows={7}
                placeholder="Paste or type the text you want read aloud…"
                className="w-full rounded-xl bg-slate-100 dark:bg-navy3/60 p-3 text-sm outline-none focus:ring-2 ring-accent resize-none" />
              <button disabled={!text.trim()} onClick={()=>commit(text, text.slice(0,40))}
                className="mt-3 w-full py-2.5 rounded-xl bg-accent text-white font-semibold disabled:opacity-40 hover:bg-blue-600 transition">
                Add to library
              </button>
            </>
          )}
          {tab==='file' && (
            <>
              <div onClick={()=>!parsing && fileRef.current.click()}
                className={cx('border-2 border-dashed rounded-2xl p-8 text-center transition',
                  parsing ? 'border-accent cursor-wait' : 'border-slate-300 dark:border-navy3 hover:border-accent cursor-pointer')}>
                {parsing ? (
                  <>
                    <span className="w-8 h-8 mx-auto mb-2 block border-2 border-accent border-t-transparent rounded-full animate-spin" />
                    <div className="font-semibold text-sm">Extracting text…</div>
                    <div className="text-xs text-slate-400 mt-1 truncate">{parsing}</div>
                  </>

    </div>
  );

/* ────────────────────────────────────────────────────────────────────────
   READER (main panel)
   ──────────────────────────────────────────────────────────────────────── */
function Reader({ doc, words, sentences, curWord, curSentence, fontSize, lineH, dyslexia,
  focusMode, setFocusMode, notedWords, onWordClick, onAddNote, playing, sentenceHi }){

  const activeRef = useRef(null);
  const scrollRef = useRef(null);

  // map word index → sentence index (for sentence-level dimming)
  const wordSentence = useMemo(()=>{
    const arr = new Array(words.length).fill(0);
    sentences.forEach((s,si)=>{ for(let i=s.wStart;i<=s.wEnd;i++) arr[i]=si; });
    return arr;
  }, [words, sentences]);

  // auto-scroll active word to center
  useEffect(()=>{
    if(activeRef.current && scrollRef.current){
      activeRef.current.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  }, [curWord, curSentence]);

  const notedSet = useMemo(()=>new Set(notedWords), [notedWords]);

  // Focus mode: show only current sentence
  const focusSentence = sentences[curSentence];

  return (
    <main className="flex-1 min-w-0 relative flex flex-col">
      {/* doc header */}
      {!focusMode && (
        <div className="px-8 pt-6 pb-3 border-b border-slate-100 dark:border-navy3/50 bg-gradient-to-b from-white/40 dark:from-navy2/30 to-transparent">
          <div className="flex items-center gap-2 text-xs text-slate-400 mb-1">
            <I.folder className="w-3.5 h-3.5" /> {doc.folder}
            <span>·</span><span>{doc.updated}</span>
            <Pill tone={doc.status==='Complete'?'green':'amber'}>{doc.status}</Pill>
          </div>
          <h1 className="text-2xl font-extrabold tracking-tight">{doc.title}</h1>
          <div className="text-xs text-slate-400 mt-1">
            {words.length} words · {sentences.length} sentences · ~{Math.ceil(words.length/130)} min listen
            <span className="mx-2">·</span>
            <button onClick={onAddNote} className="text-accent font-semibold hover:underline">Select text → Add note</button>
          </div>
        </div>
      )}

      <div ref={scrollRef} className={cx('flex-1 overflow-y-auto', focusMode ? 'grid place-items-center px-10' : 'px-8 py-8')}>
        {focusMode ? (
          <div className="max-w-3xl text-center animate-fadeUp">
            <button onClick={()=>setFocusMode(false)}
              className="fixed top-5 right-5 z-10 flex items-center gap-1 text-xs px-3 py-2 rounded-xl bg-navy3/70 text-white hover:bg-navy3">
              <I.close className="w-4 h-4" /> Exit focus (F)
            </button>
            <p style={{ fontSize: fontSize+10, lineHeight: lineH }}
               className={cx('font-medium', dyslexia && 'font-dys')}>
              {focusSentence ? focusSentence.text.split(/(\s+)/).map((tok,i)=>{
                  return <span key={i}>{tok}</span>;
                }) : 'Press play to begin.'}
            </p>
            <div className="mt-8 text-sm text-slate-400">Sentence {curSentence+1} of {sentences.length}</div>
          </div>
        ) : (
          <article className={cx('prose-body max-w-3xl mx-auto', dyslexia && 'font-dys')}
            style={{ fontSize, lineHeight: lineH }}>
            {renderParagraphs(doc.body, words, { curWord, notedSet, wordSentence, curSentence, activeRef, onWordClick, sentenceHi })}
          </article>
        )}
      </div>
    </main>
  );
}

/* render body preserving paragraphs, wrapping each word in a span */
function renderParagraphs(body, words, ctx){
  const { curWord, notedSet, wordSentence, curSentence, activeRef, onWordClick, sentenceHi } = ctx;
  // build paragraph ranges over the original text
  const paras = body.split(/\n{2,}|\n/).filter(p=>p.trim().length);
  // We map words sequentially to paragraphs by scanning text positions.
  let wi = 0;
  const out = [];
  let firstInSentence = true;   // anchor the scroll ref to the first word of the active sentence
  paras.forEach((para, pi)=>{
    const paraWords = para.match(/\S+/g) || [];
    const spans = [];
    paraWords.forEach((pw, k)=>{
      const idx = wi; wi++;
      // word-level highlight (built-in voices) OR sentence-level highlight (cloned voices)
      const inActiveSentence = sentenceHi && wordSentence[idx] === curSentence;
      const isActive = sentenceHi ? inActiveSentence : (idx === curWord);
      const anchorHere = isActive && (!sentenceHi || firstInSentence);
      if(anchorHere) firstInSentence = false;
      const isNoted = notedSet.has(idx);
      spans.push(
        <span key={idx}
          ref={anchorHere ? activeRef : null}
          onClick={()=>onWordClick(idx)}
          className={cx('reading-word cursor-pointer hover:bg-accent/10',
            isActive && 'word-active', isNoted && !isActive && 'word-note')}>
          {pw}
        </span>
      );
      spans.push(' ');
    });
    out.push(<p key={pi} className="mb-5">{spans}</p>);
  });
  return out;
}

  const [ask, setAsk] = useState('');

  // reset results when doc changes
  useEffect(()=>{ setSummary(null); setCards(null); setQuiz(null); setChat([]); }, [doc.id]);

  function fakeDelay(ms){ return new Promise(r=>setTimeout(r, ms)); }
  function sentencesOf(){ return (doc.body.match(/[^.!?]+[.!?]/g)||[]).map(s=>s.trim()); }
  const hasKey = !!VF_AI.key();

  // graceful fallback: real Claude when a key is set, otherwise mock
  function mockHint(){ toast('Add an API key in Settings → AI for real results', '#f59e0b'); }
  function aiError(e){ toast('AI error: ' + (e && e.message ? e.message : e), '#ef4444'); }

  async function doSummary(){
    setBusy('summary'); setSummary(null);
    try {
      const out = await callClaude({
        system:'You are an interview-prep coach. Summarize the document as 3 to 5 key points. For each point, add a concise, practical "pro tip" on how to use it in a job interview — e.g. how to phrase it, what to emphasize, or a follow-up to anticipate. Keep each point and tip to one sentence; be faithful to the text; no preamble.',
        user: docContext(doc), maxTokens:1000, effort:'low', schema: SCHEMA.summary });
      setSummary((out.points||[]).slice(0,6)); toast('Summary + interview tips ready', '#3B82F6');
    } catch(e){
      if(e && e.noKey){ await fakeDelay(900); const s=sentencesOf();
        setSummary([s[0], s[Math.floor(s.length*0.3)], s[Math.floor(s.length*0.55)], s[Math.floor(s.length*0.8)], s[s.length-1]]
          .filter(Boolean).map(t=>({ point:t.replace(/\s+/g,' ').slice(0,140), tip:'' }))); mockHint(); }
      else aiError(e);
    } finally { setBusy(''); }
  }
  async function doCards(){
    setBusy('cards'); setCards(null);
    try {
      const out = await callClaude({
        system:'You are a study assistant. Create exactly 5 question-and-answer flashcards that test understanding of the document. Questions should be clear; answers concise and correct.',

    } catch(e){
      if(e && e.noKey){ await fakeDelay(1000); const s=sentencesOf();
        setCards([0,1,2,3,4].map(i=>{ const base=s[i%s.length]||'Key concept.'; return { q:`What does the passage say about "${base.split(' ').slice(0,4).join(' ')}…"?`, a:base }; })); mockHint(); }
      else aiError(e);
    } finally { setBusy(''); }
  }
  async function doQuiz(){
    setBusy('quiz'); setQuiz(null);
    try {
      const out = await callClaude({
        system:'You are a study assistant. Write exactly 3 multiple-choice questions about the document. Each has 4 options and one correct answer. Return the index (0-3) of the correct option in "correct".',
        user: docContext(doc), maxTokens:2048, schema: SCHEMA.quiz });
      const q = (out.questions||[]).slice(0,5).map(x=>({ q:x.q, opts:x.options, correct:x.correct }));
      setQuiz(q); toast('Quiz generated', '#3B82F6');
    } catch(e){
      if(e && e.noKey){ await fakeDelay(1000); const s=sentencesOf();
        setQuiz([0,1,2].map(i=>{ const correct=(s[i]||'The main idea').split(' ').slice(0,5).join(' ');
          return { q:`Which best reflects point ${i+1} of the document?`, opts:[correct,'A loosely related detail','An unrelated claim','None of the above'], correct:0 }; })); mockHint(); }
      else aiError(e);
    } finally { setBusy(''); }
  }
  async function doAsk(){
    const text = ask.trim(); if(!text) return;
    setChat(c=>[...c, {role:'user', text}]); setAsk(''); setBusy('ask');
    try {
      const answer = await callClaude({
        system:'You answer questions strictly using the provided document. If the answer is not in the document, say so. Be concise.',
        user:`Document:\n${docContext(doc)}\n\nQuestion: ${text}`, maxTokens:1024 });
      setChat(c=>[...c, {role:'ai', text:answer}]);
    } catch(e){
      if(e && e.noKey){ await fakeDelay(900); const s=sentencesOf(); const ref=s[Math.floor(Math.random()*s.length)]||'';
        setChat(c=>[...c, {role:'ai', text:`(Demo — no API key) Based on "${doc.title}": ${ref}`}]); }
      else setChat(c=>[...c, {role:'ai', text:'⚠️ ' + (e && e.message ? e.message : e)}]);
    } finally { setBusy(''); }
  }

  return (
    <>
    {open && <div className="fixed inset-0 z-30 bg-black/40 lg:hidden" onClick={()=>setOpen(false)} />}
    <aside className={cx('h-full border-l border-slate-200 dark:border-navy3 bg-white dark:bg-navy2 lg:bg-white/60 lg:dark:bg-navy2/40 flex flex-col z-40 shadow-2xl lg:shadow-none',
      // mobile: fixed slide-over drawer from the right

      open ? 'lg:w-96' : 'lg:w-0')}>
      <div className="w-full lg:w-96 flex flex-col h-full">
        <div className="p-3 flex items-center justify-between border-b border-slate-200 dark:border-navy3">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-accent to-indigo-500 grid place-items-center text-white">
              <I.spark className="w-4 h-4" />

          {[['tools','Tools'],['notes','Notes']].map(([id,l])=>(

              {l}

          ))}

        <div className="flex-1 overflow-y-auto px-3 pb-4 space-y-3">
          {tab==='tools' && (

              <div className="grid grid-cols-2 gap-2">
                <ToolBtn label="Summarize" onClick={doSummary} busy={busy==='summary'} />
                <ToolBtn label="Flashcards" onClick={doCards} busy={busy==='cards'} />
                <ToolBtn label="Quiz Me" onClick={doQuiz} busy={busy==='quiz'} />
                <ToolBtn label="Key Terms" onClick={()=>toast('Key Terms — mock','#3B82F6')} busy={false} />
              </div>

              {summary && (
                <Card title="Summary + Interview Tips">
                  <ul className="space-y-3">
                    {summary.map((b,i)=>(
                      <li key={i} className="text-sm">
                        <div className="flex gap-2">
                          <span className="text-accent mt-0.5 font-bold">{i+1}.</span>
                          <span className="font-medium">{b.point}</span>

                        {b.tip && (
                          <div className="mt-1.5 ml-5 flex gap-1.5 text-xs rounded-lg bg-amber-500/10 border border-amber-500/30 px-2.5 py-1.5">

              {cards && (
                <Card title="Flashcards">
                  <div className="space-y-2">
                    {cards.map((c,i)=><Flashcard key={i} {...c} />)}

                  <button onClick={()=>saveCards(cards)}

              {quiz && (
                <Card title="Quiz">
                  <div className="space-y-3">
                    {quiz.map((q,i)=><QuizItem key={i} {...q} />)}

                </Card>

              <Card title="Ask a Question">
                <div className="space-y-2 mb-2 max-h-56 overflow-y-auto">

          {tab==='notes' && (

      </div>
    </aside>
    </>

                  <option value="claude-opus-4-8">Claude Opus 4.8 (most capable)</option>
                  <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (balanced)</option>

              <div className="flex gap-2">
                <button onClick={saveKey} className="flex-1 py-2.5 rounded-xl bg-accent text-white font-semibold hover:bg-blue-600 transition">Save</button>

              <div className="rounded-xl bg-amber-500/10 border border-amber-500/30 p-3 text-xs text-amber-700 dark:text-amber-300 leading-relaxed">
                <b>Security note:</b> the key is stored only in this browser's localStorage and sent directly from your browser to Anthropic. Anyone with access to this device can read it. Use a personal/dev key for local use — don't ship this build publicly with a key embedded. Without a key, the AI tools return demo responses.
              </div>
              <p className="text-xs text-slate-400">Powers Summarize, Flashcards, Quiz, and grounded Q&amp;A in the AI panel. Get a key at console.anthropic.com.</p>
            </>
          )}
          {tab==='pron' && (
            <>
              <p className="text-sm text-slate-500 dark:text-slate-300">Replace words or abbreviations with how they should be spoken.</p>
              <div className="flex gap-2">
                <input value={nf} onChange={e=>setNf(e.target.value)} placeholder="Word (e.g. AWS)"
                  className="flex-1 rounded-xl bg-slate-100 dark:bg-navy3/60 px-3 py-2 text-sm outline-none" />
                <input value={nt} onChange={e=>setNt(e.target.value)} placeholder="Say as…"

function Slider({ label, value, min, max, step, suffix='', onChange }){

      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e=>onChange(parseFloat(e.target.value))} className="w-full text-slate-400" />
    </div>
  );
}
function Toggle({ label, value, onChange }){
  return (
    <button onClick={()=>onChange(!value)} className="w-full flex items-center justify-between py-1">
      <span className="text-sm font-medium">{label}</span>
      <span className={cx('w-11 h-6 rounded-full transition relative', value ? 'bg-accent' : 'bg-slate-300 dark:bg-navy3')}>
        <span className={cx('absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all', value ? 'left-[22px]' : 'left-0.5')} />
      </span>
    </button>
  );
}

/* ────────────────────────────────────────────────────────────────────────
   EXPORT AUDIO MODAL  (getDisplayMedia tab-audio capture → MP3/WAV)
   ──────────────────────────────────────────────────────────────────────── */
function ExportModal({ onClose, doc, rate, volume, voiceId, initialPodcast, onComplete, toast }){
  const [format, setFormat] = useState('mp3');
  const [podcast, setPodcast] = useState(!!initialPodcast);
  const [status, setStatus] = useState('idle');   // idle | recording | encoding | done | error
  const [progress, setProgress] = useState(0);
  const [errMsg, setErrMsg] = useState('');
  const [result, setResult] = useState(null);      // { name, size }
  const stopRef = useRef(false);

  const chars = doc.body.length;
  const words = (doc.body.match(/\S+/g)||[]).length;
  const paraCount = doc.body.split(/\n{2,}|\n/).filter(p=>p.trim()).length;
  const podcastOverhead = podcast ? (6 + paraCount*0.75) : 0;   // intro/outro + section pauses (s)
  const estSec = words / (2.6 * rate) + podcastOverhead;
  const estBytes = format==='mp3' ? estSec*16*1024 : estSec*44100*2;
  const mp3Ready = !!(window.lamejs && window.lamejs.Mp3Encoder);

  function matchVoice(){
    const meta = VOICES.find(v=>v.id===voiceId) || VOICES[0];
    const list = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    const v = list.find(x=>x.lang===meta.lang) || list.find(x=>x.lang && x.lang.slice(0,2)===meta.lang.slice(0,2)) || list[0];
    return { sys:v, meta };
  }

  function speakAll(segments, opts, onProg){
    return new Promise(resolve=>{
      let i = 0;
      const next = ()=>{
        if(stopRef.current || i>=segments.length){ resolve(); return; }
        const seg = segments[i];
        const u = new SpeechSynthesisUtterance(applyPron(seg.text));
        if(opts.sys) u.voice = opts.sys;
        u.lang = (opts.sys && opts.sys.lang) || opts.meta.lang;
        u.rate = Math.max(0.5, Math.min(4, rate));
        u.pitch = opts.meta.pitch; u.volume = volume;
        u.onend = ()=>{ i++; onProg(i/segments.length); setTimeout(next, seg.pause||0); };
        u.onerror = ()=>{ i++; next(); };
        window.speechSynthesis.speak(u);
      };
      next();
    });
  }

  async function start(){
    setErrMsg(''); stopRef.current = false;
    if(!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia){
      setStatus('error'); setErrMsg('This browser cannot capture tab audio. Try Chrome or Edge on desktop.'); return;
    }
    let stream;
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
    } catch(e){
      setStatus('error'); setErrMsg('Screen/tab share was cancelled. To export, choose “This Tab” and enable “Share tab audio.”'); return;
    }
    const audioTracks = stream.getAudioTracks();
    if(!audioTracks.length){
      stream.getTracks().forEach(t=>t.stop());
      setStatus('error'); setErrMsg('No audio was shared. Re-run and tick the “Share tab audio” checkbox in the picker.'); return;
    }
    try {
      setStatus('recording'); setProgress(0);
      const audioStream = new MediaStream(audioTracks);
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
      const rec = new MediaRecorder(audioStream, { mimeType: mime });
      const chunks = [];
      rec.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
      const stopped = new Promise(r=>{ rec.onstop = r; });
      rec.start(250);

      const opts = matchVoice();
      const segments = buildSegments(doc, podcast);
      await speakAll(segments, opts, p=>setProgress(p*0.9));

      rec.stop();
      stream.getTracks().forEach(t=>t.stop());
      await stopped;

      setStatus('encoding'); setProgress(0.92);
      const webm = new Blob(chunks, { type:'audio/webm' });
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const decoded = await ac.decodeAudioData(await webm.arrayBuffer());
      ac.close();
      const pcm = bufferToMono(decoded);

      let blob, ext, usedFallback = false;
      if(format==='mp3'){
        try { blob = encodeMP3(pcm, decoded.sampleRate, 128); ext='mp3'; }
        catch(e){ blob = encodeWAV(pcm, decoded.sampleRate); ext='wav'; usedFallback = true; }
      } else { blob = encodeWAV(pcm, decoded.sampleRate); ext='wav'; }

      const name = doc.title.replace(/[^\w\s-]/g,'').replace(/\s+/g,'_') + (podcast?'_podcast':'') + '.' + ext;
      setProgress(1);
      downloadBlob(blob, name);
      setResult({ name, size: blob.size });
      setStatus('done');
      if(usedFallback) toast('MP3 encoder unavailable — saved as WAV', '#f59e0b');
      onComplete && onComplete();
    } catch(e){
      try { stream.getTracks().forEach(t=>t.stop()); } catch(_){}
      setStatus('error'); setErrMsg('Export failed: ' + (e && e.message ? e.message : e));
    }
  }

  function cancel(){
    stopRef.current = true;
    try { window.speechSynthesis.cancel(); } catch(e){}
    if(status==='idle' || status==='done' || status==='error') onClose();
    else setStatus('idle');
  }

  const busy = status==='recording' || status==='encoding';

  return (
    <div className="fixed inset-0 z-[80] grid place-items-center bg-black/50 backdrop-blur-sm p-4" onClick={()=>!busy&&onClose()}>
      <div className="w-full max-w-md rounded-2xl bg-white dark:bg-navy2 border border-slate-200 dark:border-navy3 shadow-2xl animate-pop" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-slate-200 dark:border-navy3">
          <h3 className="font-bold text-lg flex items-center gap-2">{podcast ? <I.wave className="w-5 h-5 text-accent"/> : <I.dl className="w-5 h-5 text-accent"/>} {podcast ? 'Convert to Podcast' : 'Export audio'}</h3>
          {!busy && <IconBtn icon={I.close} label="Close" onClick={onClose} />}
        </div>

        <div className="p-4 space-y-4">
          <div>
            <div className="text-sm font-semibold truncate">{doc.title}</div>
            <div className="text-xs text-slate-400">{doc.folder}</div>
          </div>

          {/* stats */}
          <div className="grid grid-cols-2 gap-2">
            <Stat label="Characters" value={chars.toLocaleString()} />
            <Stat label="Words" value={words.toLocaleString()} />
            <Stat label="Est. duration" value={'~'+fmtTime(estSec)} />
            <Stat label="Est. size" value={'~'+fmtBytes(estBytes)} />
          </div>

          {/* format */}
          <div>
            <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Format</div>
            <div className="flex gap-1 p-1 rounded-xl bg-slate-100 dark:bg-navy3/50">
              {[['mp3','MP3'],['wav','WAV']].map(([id,l])=>(
                <button key={id} onClick={()=>!busy&&setFormat(id)} disabled={busy}
                  className={cx('flex-1 text-sm font-semibold py-2 rounded-lg transition',
                    format===id ? 'bg-white dark:bg-navy text-accent shadow' : 'text-slate-500')}>
                  {l}{id==='mp3' && !mp3Ready && <span className="text-[10px] text-amber-500 ml-1">→WAV</span>}
                </button>
              ))}
            </div>
          </div>

          {/* podcast toggle */}
          <button onClick={()=>!busy&&setPodcast(p=>!p)} disabled={busy}
            className={cx('w-full flex items-center gap-3 p-3 rounded-xl border text-left transition',
              podcast ? 'border-accent bg-accent/10' : 'border-slate-200 dark:border-navy3 hover:border-accent')}>
            <div className={cx('w-9 h-9 rounded-lg grid place-items-center shrink-0', podcast?'bg-accent text-white':'bg-slate-100 dark:bg-navy3 text-slate-400')}>
              <I.wave className="w-5 h-5" />
            </div>
            <div className="flex-1">
              <div className="text-sm font-semibold">Podcast style</div>
              <div className="text-[11px] text-slate-400">Adds intro & outro narration and pauses between sections — ideal for commutes.</div>
            </div>
            <span className={cx('w-10 h-6 rounded-full relative transition shrink-0', podcast?'bg-accent':'bg-slate-300 dark:bg-navy3')}>
              <span className={cx('absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all', podcast?'left-[18px]':'left-0.5')} />
            </span>
          </button>

          {/* state */}
          {status==='idle' && !HAS_TAB_CAPTURE && (
            <div className="rounded-xl bg-amber-500/10 border border-amber-500/30 p-3 text-xs text-amber-700 dark:text-amber-300 leading-relaxed">
              <b>Not available on this device.</b> Audio export records the tab via screen-share, which mobile browsers don't support. Use VoiceFlow on a <b>desktop Chrome or Edge</b> to export audio.
            </div>
          )}
          {status==='idle' && HAS_TAB_CAPTURE && (
            <div className="rounded-xl bg-accent/8 border border-accent/20 p-3 text-xs text-slate-500 dark:text-slate-300 leading-relaxed">
              The Web Speech voice plays through your speakers, so VoiceFlow records it by capturing this tab. When the picker appears, choose <b>“This Tab”</b> and switch on <b>“Share tab audio.”</b> Keep this tab focused while it records.
            </div>
          )}
          {(busy || status==='done') && (
            <div>
              <div className="flex justify-between text-xs font-semibold mb-1">
                <span>{status==='recording'?'Recording narration…':status==='encoding'?'Encoding '+format.toUpperCase()+'…':'Done'}</span>
                <span className="tabular-nums">{Math.round(progress*100)}%</span>
              </div>
              <div className="h-2 rounded-full bg-slate-200 dark:bg-navy3 overflow-hidden">
                <div className="h-full bg-accent transition-all" style={{width:`${progress*100}%`}} />
              </div>
            </div>
          )}
          {status==='done' && result && (
            <div className="rounded-xl bg-emerald-500/10 border border-emerald-500/30 p-3 text-sm text-emerald-600 dark:text-emerald-400">
              Saved <b>{result.name}</b> · {fmtBytes(result.size)}
            </div>
          )}
          {status==='error' && (
            <div className="rounded-xl bg-red-500/10 border border-red-500/30 p-3 text-sm text-red-500">{errMsg}</div>
          )}

          {/* actions */}
          <div className="flex gap-2 pt-1">
            {status!=='done' && (
              <button onClick={start} disabled={busy || !HAS_TAB_CAPTURE}
                className="flex-1 py-2.5 rounded-xl bg-accent text-white font-semibold hover:bg-blue-600 transition disabled:opacity-50 flex items-center justify-center gap-2">
                {busy ? <><span className="w-4 h-4 border-2 border-white/60 border-t-transparent rounded-full animate-spin"/>Working…</> : <>{status==='error'?'Try again':'Start export'}</>}
              </button>
            )}
            <button onClick={cancel}
              className={cx('py-2.5 rounded-xl font-semibold transition',
                status==='done' ? 'flex-1 bg-accent text-white hover:bg-blue-600' : 'px-4 bg-slate-100 dark:bg-navy3 hover:bg-slate-200 dark:hover:bg-navy3/70')}>
              {busy ? 'Cancel' : status==='done' ? 'Done' : 'Close'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
function Stat({ label, value }){

    <div className="rounded-xl bg-slate-100 dark:bg-navy3/40 p-3">

/* ────────────────────────────────────────────────────────────────────────
   VOICE LAB — clone a voice from uploaded samples (ElevenLabs)
   ──────────────────────────────────────────────────────────────────────── */
function VoiceLab({ onClose, onCloned, toast }){
  const [name, setName] = useState('');
  const [files, setFiles] = useState([]);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const fileRef = useRef(null);
  const hasKey = !!VF_11.key();

  function onPick(e){
    const list = [...e.target.files].filter(f=>/audio\//.test(f.type) || /\.(mp3|wav|m4a|ogg|webm|flac)$/i.test(f.name));
    setFiles(prev=>[...prev, ...list].slice(0,5));
    if(fileRef.current) fileRef.current.value='';
  }
  function removeFile(i){ setFiles(fs=>fs.filter((_,k)=>k!==i)); }

  async function clone(){
    setErr('');
    if(!hasKey){ setErr('Add your ElevenLabs API key first (Settings → Voice).'); return; }
    if(!name.trim()){ setErr('Give the voice a name.'); return; }
    if(!files.length){ setErr('Upload at least one audio sample.'); return; }
    setBusy(true);
    try {
      const id = await elevenClone(name.trim(), files);
      onCloned({ id, name:name.trim(), tag:'Cloned voice', lang:'en-US', pitch:1, cloned:true });
      toast('Voice cloned ✓', '#10b981');
      onClose();
    } catch(e){
      setErr((e && e.message) || 'Cloning failed.');
    } finally { setBusy(false); }
  }

  return (
    <div className="fixed inset-0 z-[80] grid place-items-center bg-black/50 backdrop-blur-sm p-4" onClick={()=>!busy&&onClose()}>
      <div className="w-full max-w-md rounded-2xl bg-white dark:bg-navy2 border border-slate-200 dark:border-navy3 shadow-2xl animate-pop" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-slate-200 dark:border-navy3">
          <h3 className="font-bold text-lg flex items-center gap-2"><I.wave className="w-5 h-5 text-emerald-500"/> Clone a voice</h3>
          {!busy && <IconBtn icon={I.close} label="Close" onClick={onClose} />}
        </div>
        <div className="p-4 space-y-4">
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Voice name (e.g. My Voice)"
            className="w-full rounded-xl bg-slate-100 dark:bg-navy3/60 px-3 py-2 text-sm outline-none focus:ring-2 ring-accent" />

          <div onClick={()=>fileRef.current.click()}
            className="border-2 border-dashed border-slate-300 dark:border-navy3 rounded-2xl p-6 text-center cursor-pointer hover:border-emerald-500 transition">
            <I.upload className="w-7 h-7 mx-auto text-slate-400 mb-2" />
            <div className="font-semibold text-sm">Upload voice sample(s)</div>
            <div className="text-xs text-slate-400 mt-1">MP3 · WAV · M4A · 1–5 clips, clear speech, ~30s+ total</div>
            <input ref={fileRef} type="file" accept="audio/*" multiple className="hidden" onChange={onPick} />
          </div>

          {files.length>0 && (
            <div className="space-y-1.5">
              {files.map((f,i)=>(
                <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-slate-100 dark:bg-navy3/50 text-sm">
                  <I.wave className="w-4 h-4 text-emerald-500 shrink-0" />
                  <span className="flex-1 truncate">{f.name}</span>
                  <span className="text-[11px] text-slate-400 shrink-0">{fmtBytes(f.size)}</span>
                  <button onClick={()=>removeFile(i)} className="text-slate-400 hover:text-red-500"><I.close className="w-4 h-4"/></button>
                </div>
              ))}
            </div>
          )}

          {!hasKey && (
            <div className="rounded-xl bg-amber-500/10 border border-amber-500/30 p-3 text-xs text-amber-700 dark:text-amber-300">
              You need an <b>ElevenLabs API key</b> (paid plan) to clone voices. Add it in <b>Settings → Voice</b>, then come back here.
            </div>
          )}
          {err && <div className="rounded-xl bg-red-500/10 border border-red-500/30 p-3 text-sm text-red-500">{err}</div>}

          <div className="flex gap-2">
            <button onClick={clone} disabled={busy}
              className="flex-1 py-2.5 rounded-xl bg-emerald-500 text-white font-semibold hover:bg-emerald-600 transition disabled:opacity-60 flex items-center justify-center gap-2">
              {busy ? <><span className="w-4 h-4 border-2 border-white/60 border-t-transparent rounded-full animate-spin"/>Cloning…</> : 'Clone voice'}
            </button>
            <button onClick={onClose} className="px-4 rounded-xl bg-slate-100 dark:bg-navy3 font-semibold">Cancel</button>
          </div>
          <p className="text-[11px] text-slate-400">Only upload voices you have permission to clone. Your samples are sent directly to ElevenLabs.</p>
        </div>
      </div>
    </div>
  );
}

          <h1 className="text-xl font-extrabold tracking-tight">Library</h1>
        </div>

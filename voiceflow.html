            className="w-full rounded-xl bg-slate-100 dark:bg-navy2 px-4 py-2 text-sm outline-none focus:ring-2 ring-accent" />
        </div>
        <button onClick={()=>setImportOpen(true)}
          className="flex items-center gap-1.5 text-sm font-semibold px-4 py-2 rounded-xl bg-accent text-white hover:bg-blue-600 transition shadow-lg shadow-accent/30">
          <I.plus className="w-4 h-4" /> New document
        </button>
      </header>

      <div className="max-w-6xl mx-auto px-7 py-7 space-y-9">
        {/* upload hero */}
        <div onClick={()=>setImportOpen(true)}
          className="cursor-pointer rounded-3xl border-2 border-dashed border-slate-300 dark:border-navy3 hover:border-accent bg-gradient-to-br from-accent/5 to-indigo-500/5 p-8 flex items-center gap-5 transition group">
          <div className="w-14 h-14 rounded-2xl bg-accent/15 text-accent grid place-items-center group-hover:scale-105 transition">
            <I.upload className="w-7 h-7" />
          </div>
          <div className="flex-1">
            <div className="font-bold text-lg">Add something to read</div>
            <div className="text-sm text-slate-400">Paste text, upload a PDF / DOCX / TXT / EPUB, or drop in a web article URL — VoiceFlow narrates it word-by-word.</div>
          </div>
          <div className="hidden sm:flex gap-2 text-slate-400">

            <span className="px-2.5 py-1 rounded-lg bg-slate-100 dark:bg-navy2 text-xs font-semibold flex items-center gap-1"><I.upload className="w-3.5 h-3.5"/>File</span>
            <span className="px-2.5 py-1 rounded-lg bg-slate-100 dark:bg-navy2 text-xs font-semibold flex items-center gap-1"><I.link className="w-3.5 h-3.5"/>URL</span>

/* ────────────────────────────────────────────────────────────────────────
   STUDY DASHBOARD (cross-document highlights, notes, flashcards)
   ──────────────────────────────────────────────────────────────────────── */
function StudyDashboard({ docs, annos, savedCards, setSavedCards, openDoc, toast }){
  const [tab, setTab] = useState('notes');
  const docTitle = (id)=> (docs.find(d=>d.id===id)||{}).title || 'Document';

  // flatten notes across docs
  const allNotes = [];
  Object.entries(annos).forEach(([docId,a])=>{
    (a.notes||[]).forEach(n=>allNotes.push({...n, docId}));
  });
  const totalHl = Object.values(annos).reduce((n,a)=>n+(a.notedWords?a.notedWords.length:0),0);

  function removeCard(i){ setSavedCards(cs=>cs.filter((_,k)=>k!==i)); toast('Flashcard removed','#f59e0b'); }
  function exportAll(){
    let md = `# VoiceFlow Study Dashboard\n\n## Flashcards (${savedCards.length})\n`;
    savedCards.forEach(c=>{ md += `\n**Q (${c.docTitle}):** ${c.q}\n**A:** ${c.a}\n`; });
    md += `\n## Notes (${allNotes.length})\n`;
    allNotes.forEach(n=>{ md += `- (${docTitle(n.docId)} · ${n.ts}) ${n.text}\n`; });
    const blob = new Blob([md],{type:'text/markdown'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='voiceflow_study.md'; a.click();
    toast('Dashboard exported (.md)','#10b981');
  }

  const stats = [
    { label:'Saved flashcards', value:savedCards.length },
    { label:'Margin notes', value:allNotes.length },
    { label:'Highlighted words', value:totalHl },
    { label:'Documents', value:docs.length },
  ];
  const tabs = [['notes',`Notes (${allNotes.length})`],['cards',`Flashcards (${savedCards.length})`],['progress','Progress']];

  return (
    <div className="flex-1 overflow-y-auto">
      <header className="sticky top-0 z-20 h-16 px-7 flex items-center justify-between bg-white/80 dark:bg-navy/80 backdrop-blur border-b border-slate-200 dark:border-navy3">
        <div className="flex items-center gap-2">
          <I.grid className="w-5 h-5 text-accent" />
          <h1 className="text-xl font-extrabold tracking-tight">Study Dashboard</h1>
        </div>
        <button onClick={exportAll} className="text-sm font-semibold px-4 py-2 rounded-xl bg-slate-100 dark:bg-navy2 hover:bg-accent hover:text-white transition">Export all (.md)</button>
      </header>

      <div className="max-w-5xl mx-auto px-7 py-7 space-y-7">
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
          {stats.map(s=>(
            <div key={s.label} className="rounded-2xl border border-slate-200 dark:border-navy3 bg-white dark:bg-navy2/60 p-4">
              <div className="text-xs text-slate-400 font-semibold mb-1">{s.label}</div>
              <div className="text-3xl font-extrabold tracking-tight">{s.value}</div>
            </div>
          ))}
        </div>

        <div className="flex gap-1 p-1 rounded-xl bg-slate-100 dark:bg-navy2 w-fit">
          {tabs.map(([id,l])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={cx('text-sm font-semibold px-4 py-2 rounded-lg transition',
                tab===id ? 'bg-white dark:bg-navy text-accent shadow' : 'text-slate-500')}>
              {l}
            </button>
          ))}
        </div>

        {tab==='notes' && (
          <div className="space-y-2">
            {allNotes.length===0 && <Empty text="No notes yet. In the Reader, select text and choose “Add note”." />}
            {allNotes.map(n=>(
              <div key={n.id} className="rounded-2xl border border-slate-200 dark:border-navy3 bg-white dark:bg-navy2/60 p-4">
                <div className="flex items-center justify-between mb-1">
                  <button onClick={()=>openDoc(n.docId)} className="text-xs font-bold text-accent hover:underline">{docTitle(n.docId)}</button>
                  <span className="text-[11px] text-slate-400">{n.ts}</span>
                </div>
                <div className="text-sm border-l-2 border-amber-400 pl-3">{n.text}</div>
              </div>
            ))}
          </div>
        )}

        {tab==='cards' && (
          <div className="grid sm:grid-cols-2 gap-3">
            {savedCards.length===0 && <Empty text="No saved flashcards. Generate them in the AI panel and click “Save to Study Dashboard”." />}
            {savedCards.map((c,i)=>(
              <div key={i} className="relative rounded-2xl border border-slate-200 dark:border-navy3 bg-white dark:bg-navy2/60 p-4 group">
                <button onClick={()=>removeCard(i)} className="absolute top-3 right-3 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><I.trash className="w-4 h-4"/></button>
                <button onClick={()=>openDoc(c.docId)} className="text-[11px] font-bold text-accent hover:underline mb-2 block">{c.docTitle}</button>
                <Flashcard q={c.q} a={c.a} />
              </div>
            ))}
          </div>
        )}

        {tab==='progress' && (
          <div className="space-y-2">
            {docs.map(d=>(
              <button key={d.id} onClick={()=>openDoc(d.id)}
                className="w-full text-left rounded-2xl border border-slate-200 dark:border-navy3 bg-white dark:bg-navy2/60 p-4 hover:border-accent transition flex items-center gap-4">
                <div className="w-10 h-10 rounded-xl bg-accent/10 text-accent grid place-items-center shrink-0"><I.doc className="w-5 h-5"/></div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2"><span className="font-semibold truncate">{d.title}</span><Pill tone={d.status==='Complete'?'green':'amber'}>{d.status}</Pill></div>
                  <div className="mt-1.5 h-1.5 rounded-full bg-slate-200 dark:bg-navy3 overflow-hidden"><div className="h-full bg-accent" style={{width:`${d.progress}%`}}/></div>
                </div>
                <span className="text-sm font-bold tabular-nums w-12 text-right">{d.progress}%</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}
function Empty({ text }){
  return <div className="rounded-2xl border border-dashed border-slate-300 dark:border-navy3 p-10 text-center text-sm text-slate-400">{text}</div>;
}

<!-- Bootstrap: compile the JSX with the CLASSIC runtime so it runs as a normal
     script against the React UMD global (the auto-runner defaults to the
     automatic runtime, which emits an illegal bare `import`). -->
<script>
  (function(){
    function boot(){
      try {
        var src = document.getElementById('app-src').textContent;
        var out = Babel.transform(src, {
          presets: [['react', { runtime: 'classic' }]]
        }).code;
        var s = document.createElement('script');
        s.textContent = out;
        document.body.appendChild(s);
      } catch (e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#f87171;padding:24px;white-space:pre-wrap;font:13px monospace">'
          + (e && e.message ? e.message : e) + '</pre>';
        console.error(e);
      }
    }
    if (window.Babel) boot();
    else window.addEventListener('load', boot);
  })();
</script>
